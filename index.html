<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <title>Frontend Mentor | Social links profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">

</head>

<body>

  <main>
    <div class="container">
      <section class="social">
        <div class="social__image">
          <img src="assets/images/avatar-jessica.jpeg" alt="Jessica Randall">
        </div>
        <div class="social__content">
          <h2 class="social__content-title">Jessica Randall</h2>
          <p class="social__content-location">London, United Kingdom</p>
          <p class="social__content-text">"Front-end developer and avid reader."</p>
        </div>
        <div class="social__links">
          <button class="social__links-button">GitHub</button>
          <button class="social__links-button">Frontend Mentor</button>
          <button class="social__links-button">LinkedIn</button>
          <button class="social__links-button">Twitter</button>
          <button class="social__links-button">Instagram</button>
        </div>
      </section>
    </div>
  </main>

  
  
  

  
  
  
  
  


</body>

</html>
